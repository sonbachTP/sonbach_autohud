<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sơn Bạch Signature | Tài sản lõi Q1</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070707;
  color:#f6f1dd;
  text-align:center;
}

/* LOGO NHẤP NHÁY */
.logo{
  font-size:40px;
  font-weight:bold;
  color:#ffd56a;
  opacity:0.2;
  animation:blink 2s infinite;
}
@keyframes blink{
  0%,100%{opacity:0.2}
  50%{opacity:1}
}

/* SỐ 1250 TỶ PHÁT SÁNG */
.price{
  font-size:55px;
  color:#ffd56a;
  text-shadow:0 0 20px gold;
  animation:glow 1.5s infinite alternate;
}
@keyframes glow{
  from{ text-shadow:0 0 10px #ffd56a;}
  to{ text-shadow:0 0 40px #ffd56a;}
}

/* TEXT CHẠY */
.marquee{
  overflow:hidden;
  white-space:nowrap;
  box-sizing:border-box;
}
.marquee p{
  display:inline-block;
  padding-left:100%;
  animation:marquee 10s linear infinite;
}
@keyframes marquee{
  0%{ transform:translate(0,0);}
  100%{ transform:translate(-100%,0);}
}

/* NÚT */
.btn{
  display:block;
  margin:15px auto;
  padding:15px;
  width:80%;
  background:#ffd56a;
  color:#000;
  font-weight:bold;
  border-radius:8px;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="logo">SB</div>

<h2>SƠN BẠCH SIGNATURE</h2>

<div class="price">1.250 TỶ</div>

<div class="marquee">
  <p>TÀI SẢN LÕI TRUNG TÂM – KHÔNG DÀNH CHO SỐ ĐÔNG</p>
</div>

<br>

<a class="btn" href="#nda">🔒 XEM THÔNG TIN (NDA)</a>
<a class="btn" href="tel:0858999934">📞 GỌI NGAY</a>
<a class="btn" href="https://zalo.me/0858999934">💬 ZALO</a>

<br><br>

<h3 id="nda">ĐĂNG KÝ NDA</h3>

<form action="https://formspree.io/f/yourID" method="POST">
  <input type="text" name="name" placeholder="Họ tên" required style="width:80%;padding:10px"><br><br>
  <input type="text" name="phone" placeholder="SĐT" required style="width:80%;padding:10px"><br><br>
  <input type="text" name="note" placeholder="Nhu cầu" style="width:80%;padding:10px"><br><br>

  <button class="btn" type="submit">TÔI ĐỒNG Ý NDA</button>
</form>

</body>
</html>
