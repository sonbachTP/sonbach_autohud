<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sơn Bạch Signature</title>

<style>
body{
  margin:0;
  background:#050505;
  color:#fff;
  font-family:Arial;
}

/* LOGO SB NỀN */
body::before{
  content:"SB";
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:200px;
  color:rgba(255,215,0,0.05);
  font-weight:bold;
  animation: glowSB 3s infinite alternate;
  pointer-events:none;
}

@keyframes glowSB{
  from{opacity:0.05}
  to{opacity:0.12}
}

/* TEXT CHẠY */
.marquee{
  background:#000;
  color:#FFD700;
  padding:10px;
  font-weight:bold;
  white-space:nowrap;
  overflow:hidden;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:marq 15s linear infinite;
}

@keyframes marq{
  0%{transform:translateX(0)}
  100%{transform:translateX(-100%)}
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
}

.price{
  font-size:60px;
  color:#FFD700;
  animation: glow 1s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 10px #FFD700}
  to{text-shadow:0 0 30px #FFD700}
}

/* FLOAT BUTTON */
.float-actions{
  position:fixed;
  right:18px;
  bottom:80px;
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:999;
}

.fab{
  position:relative;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#FFD700;
  color:#000;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 15px rgba(255,215,0,0.6);
}

/* TOOLTIP */
.fab span{
  position:absolute;
  right:70px;
  background:#000;
  color:#FFD700;
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
  opacity:0;
  transition:0.3s;
}

.fab:hover span{
  opacity:1;
}

/* ẨN KHI SCROLL */
.hide{
  transform:translateY(100px);
  transition:0.4s;
}

</style>
</head>

<body>

<div class="marquee">
<span>🔥 TÀI SẢN LÕI KHÔNG TÁI TẠO – TRUNG TÂM QUẬN 1 – CƠ HỘI CHO NHÀ ĐẦU TƯ TRIỆU ĐÔ 🔥</span>
</div>

<div class="hero">
<h1>SƠN BẠCH SIGNATURE</h1>
<div class="price">1.250 TỶ</div>
<p>Diện tích: 1.317,3 m² – Mặt tiền 33m</p>
</div>

<!-- NÚT NỔI -->
<div class="float-actions" id="fabBox">

<a class="fab" href="tel:0858999934">☎<span>Gọi ngay</span></a>

<a class="fab" href="https://zalo.me/0858999934">Z<span>Zalo</span></a>

<a class="fab" href="https://www.facebook.com/share/1DAdyHdjze/?mibextid=wwXIfr">f<span>Facebook</span></a>

<a class="fab" href="#nda">🔐<span>Xem NDA</span></a>

</div>

<script>
let lastScroll = 0;
const fab = document.getElementById("fabBox");

window.addEventListener("scroll", () => {
  let current = window.pageYOffset;

  if(current > lastScroll){
    fab.classList.add("hide");
  } else {
    fab.classList.remove("hide");
  }

  lastScroll = current;
});
</script>

</body>
</html>
