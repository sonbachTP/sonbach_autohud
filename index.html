<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sơn Bạch Signature</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center}
.wrap{padding:20px}
.gold{color:#ffd700}
img{width:100%;border-radius:12px;margin-top:10px}
.watermark{
position:fixed;bottom:100px;left:-20px;
font-size:60px;color:rgba(255,215,0,0.08);
animation:spin 20s linear infinite}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

.price{
font-size:60px;color:#ffd700;
animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.7}}

.floating{
position:fixed;right:10px;bottom:20px;
display:flex;flex-direction:column;gap:10px}
.btn{
width:55px;height:55px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
color:#fff;text-decoration:none;font-weight:bold}
.phone{background:#ffd700;color:#000}
.zalo{background:#0a7cff}
.fb{background:#1877f2}

.hidden{display:none}
.box{background:#111;padding:15px;border-radius:12px;margin-top:15px}
input,select{width:100%;padding:12px;margin-top:10px;border-radius:6px;border:none}
button{width:100%;padding:15px;background:#ffd700;border:none;font-weight:bold;margin-top:10px}
</style>
</head>

<body>

<div class="watermark">SB</div>

<div class="wrap">

<h2 class="gold">SƠN BẠCH SIGNATURE</h2>
<h3>TÀI SẢN LÕI KHÔNG TÁI TẠO</h3>

<div class="price">1.250 TỶ</div>

<!-- ẢNH TƯƠNG LAI -->
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">

<!-- ẢNH HIỆN TẠI -->
<img src="https://images.unsplash.com/photo-1560518883-ce09059eeffa">

<div class="box">

<h3>NDA – MỞ HỒ SƠ</h3>

<form id="form">
<input placeholder="Họ tên" required>
<input placeholder="SĐT" required>

<select id="money" required>
<option value="">Chọn năng lực</option>
<option value="1">50-100 tỷ</option>
<option value="2">100-200 tỷ</option>
<option value="3">200-300 tỷ</option>
<option value="4">300-500 tỷ</option>
<option value="5">500-700 tỷ</option>
<option value="6">>700 tỷ</option>
</select>

<button>MỞ HỒ SƠ VIP</button>
</form>

</div>

<div id="score" class="box hidden"></div>

<div id="vip" class="box hidden">
<h2 class="gold">HỒ SƠ VIP</h2>
<p>0858 999 934</p>
</div>

</div>

<div class="floating">
<a href="tel:0858999934" class="btn phone">☎</a>
<a href="https://zalo.me/0858999934" class="btn zalo">Z</a>
<a href="https://www.facebook.com/share/1DAdyHdjze/?mibextid=wwXIfr" class="btn fb">f</a>
</div>

<script>
const form=document.getElementById("form");
const score=document.getElementById("score");

const data={
1:"Nhóm 50–100 tỷ: cần hợp tác",
2:"Nhóm 100–200 tỷ: xem xét đầu tư",
3:"Nhóm 200–300 tỷ: có thể đàm phán",
4:"Nhóm 300–500 tỷ: khách mạnh",
5:"Nhóm 500–700 tỷ: khách rất mạnh",
6:"Trên 700 tỷ: khách VIP"
};

form.addEventListener("submit",function(e){
e.preventDefault();
let v=document.getElementById("money").value;

score.innerHTML=data[v];
score.classList.remove("hidden");

document.getElementById("vip").classList.remove("hidden");
});
</script>

</body>
</html>
