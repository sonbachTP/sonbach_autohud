<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sơn Bạch Signature</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070707;
  color:#f6f1dd;
  text-align:center;
}

.logo{
  font-size:60px;
  font-weight:bold;
  color:#ffd56a;
  animation:blink 2s infinite;
}
@keyframes blink{
  0%,100%{opacity:0.3}
  50%{opacity:1}
}

.title{
  font-size:26px;
  margin-top:10px;
}

.price{
  font-size:60px;
  color:#ffd56a;
  text-shadow:0 0 20px gold;
  animation:glow 1.5s infinite alternate;
}
@keyframes glow{
  from{ text-shadow:0 0 10px #ffd56a;}
  to{ text-shadow:0 0 40px #ffd56a;}
}

.btn{
  display:block;
  margin:15px auto;
  padding:18px;
  width:85%;
  background:#ffd56a;
  color:#000;
  font-weight:bold;
  border-radius:12px;
  text-decoration:none;
}

form{
  margin-top:30px;
}

input, textarea{
  width:85%;
  padding:15px;
  margin:10px;
  border-radius:10px;
  border:none;
}

</style>
</head>

<body>

<div class="logo">SB</div>

<div class="title">SƠN BẠCH SIGNATURE</div>

<div class="price">1.250 TỶ</div>

<p>TÀI SẢN LÕI TRUNG TÂM – KHÔNG DÀNH CHO SỐ ĐÔNG</p>

<a class="btn" href="#nda">🔒 XEM THÔNG TIN (NDA)</a>
<a class="btn" href="tel:0858999934">📞 GỌI NGAY</a>
<a class="btn" href="https://zalo.me/0858999934">💬 ZALO</a>

<h2 id="nda">ĐĂNG KÝ NDA</h2>

<form action="https://formspree.io/f/mpqykgzk" method="POST">
  <input type="text" name="name" placeholder="Họ tên" required>
  <input type="text" name="phone" placeholder="SĐT" required>
  <textarea name="note" placeholder="Nhu cầu"></textarea>

  <button class="btn" type="submit">TÔI ĐỒNG Ý NDA</button>
</form>

</body>
</html>
