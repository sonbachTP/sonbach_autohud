<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sơn Bạch Signature | 42 Tỷ</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050505;
  color:#f5e6c8;
  text-align:center;
}

/* ===== LOGO GLOW ===== */
.logo-wrap{
  margin-top:40px;
  animation:pulse 3s infinite;
}
.logo{
  width:120px;
  border-radius:50%;
  box-shadow:0 0 60px #ffd56a;
}
@keyframes pulse{
  0%{transform:scale(1);opacity:1}
  50%{transform:scale(1.08);opacity:.9}
  100%{transform:scale(1);opacity:1}
}

/* ===== TEXT ===== */
.subtitle{
  margin-top:20px;
  letter-spacing:3px;
  font-size:12px;
  opacity:.7;
}
.title{
  font-size:42px;
  font-weight:bold;
  margin:20px 0;
}

/* ===== PRICE GLOW ===== */
.price{
  font-size:70px;
  font-weight:bold;
  color:#ffd56a;
  position:relative;
  animation:glow 2s infinite;
}
@keyframes glow{
  0%{text-shadow:0 0 10px #ffd56a}
  50%{text-shadow:0 0 40px #ffd56a}
  100%{text-shadow:0 0 10px #ffd56a}
}

/* ===== LIGHT SWEEP ===== */
.price::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  animation:sweep 3s infinite;
}
@keyframes sweep{
  0%{left:-100%}
  100%{left:120%}
}

.note{
  margin-top:5px;
  opacity:.8;
}

.section{
  padding:40px 20px;
}

.img{
  border-radius:16px;
}

/* ===== FILTER BOX ===== */
.filter button{
  margin:5px;
  padding:10px 15px;
  border-radius:20px;
  border:1px solid #ffd56a;
  background:none;
  color:#ffd56a;
}

/* ===== CTA ===== */
.cta{
  position:fixed;
  bottom:15px;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn{
  padding:12px 18px;
  border-radius:12px;
  font-weight:bold;
  animation:btnGlow 2s infinite;
}
.call{background:#ffd56a;color:black;}
.zalo{background:#2e5bff;}
.fb{background:#111;color:#fff;}

@keyframes btnGlow{
  0%{box-shadow:0 0 5px #ffd56a}
  50%{box-shadow:0 0 20px #ffd56a}
  100%{box-shadow:0 0 5px #ffd56a}
}

</style>
</head>

<body>

<!-- HERO -->
<div class="logo-wrap">
<img class="logo" src="https://raw.githubusercontent.com/sonbachTP/sonbach_autohud/main/logo-sb-vip-pro.png">
</div>

<div class="subtitle">HỒ SƠ TÀI SẢN CHỌN LỌC</div>

<div class="title">BIỆT THỰ PHÁP</div>

<div class="price">42 TỶ</div>
<div class="note">Thương lượng</div>

<p>
Tài sản quý hiếm · Giữ giá trị · Khả năng tăng giá mạnh trong tương lai
</p>

<!-- HIỆN TRẠNG -->
<div class="section">
<h2>Hiện trạng</h2>
<img class="img" src="https://raw.githubusercontent.com/sonbachTP/sonbach_autohud/refs/heads/main/IMG_6540.jpeg">
</div>

<!-- TƯƠNG LAI -->
<div class="section">
<h2>Tương lai</h2>
<img class="img" src="https://raw.githubusercontent.com/sonbachTP/sonbach_autohud/refs/heads/main/IMG_6541.jpeg">
</div>

<!-- PHÂN KHÚC -->
<div class="section filter">
<h2>Phân khúc đầu tư</h2>

<button onclick="show('a')">Dưới 50 tỷ</button>
<button onclick="show('b')">50 - 150 tỷ</button>
<button onclick="show('c')">150 - 500 tỷ</button>
<button onclick="show('d')">500 - 1500 tỷ</button>

<div id="result" style="margin-top:20px"></div>
</div>

<!-- NDA -->
<div class="section">
<h2>Đăng ký NDA</h2>

<form action="https://formspree.io/f/mpqykgzk" method="POST">
<input name="name" placeholder="Họ và tên" required>
<input name="phone" placeholder="Số điện thoại" required>
<input name="email" placeholder="Email">
<textarea name="note" placeholder="Nhu cầu"></textarea>
<button>TÔI ĐỒNG Ý NDA</button>
</form>
</div>

<!-- CTA -->
<div class="cta">
<a href="tel:0858999934" class="btn call">GỌI NGAY</a>
<a href="https://zalo.me/0858999934" class="btn zalo">ZALO</a>
<a href="https://www.facebook.com/share/1DAdyHdjze/?mibextid=wwXIfr" class="btn fb">FACEBOOK</a>
</div>

<script>
function show(x){
  let text="";
  if(x=="a") text="Biệt thự đẹp - dễ giữ tiền - phù hợp đầu tư an toàn";
  if(x=="b") text="Tài sản cao cấp - tăng trưởng tốt";
  if(x=="c") text="Hàng hiếm - biên độ tăng giá mạnh";
  if(x=="d") text="Tài sản lõi - dành cho nhà đầu tư lớn";
  document.getElementById("result").innerHTML=text;
}
</script>

</body>
</html>
