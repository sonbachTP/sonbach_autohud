<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sơn Bạch VIP PRO | An Dương Vương Q6</title>

<style>
body{
  margin:0;
  background:#050505;
  color:#f5e6c5;
  font-family:Arial;
}

/* LOGO */
.logo{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:999;
}
.logo img{
  width:90px;
  opacity:0.25;
  animation:glow 3s infinite;
}
@keyframes glow{
  0%,100%{opacity:0.2}
  50%{opacity:0.6}
}

/* HERO */
.hero{
  height:100vh;
  background:url('https://raw.githubusercontent.com/sonbachTP/sonbach_autohud/refs/heads/main/D541F61D-0E11-4145-A75F-D450C04F2851.png') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
}
.hero-content{
  position:relative;
  z-index:2;
}

/* GIÁ */
.price{
  font-size:60px;
  color:#ffd700;
  font-weight:bold;
  animation:blink 2s infinite;
}
@keyframes blink{
  0%,100%{text-shadow:0 0 10px gold}
  50%{text-shadow:0 0 30px gold}
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:12px 25px;
  background:gold;
  color:#000;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}

/* ẨN NỘI DUNG */
.section{
  padding:20px;
}
.box{
  background:#111;
  margin-bottom:10px;
  border-radius:10px;
  overflow:hidden;
}
.box button{
  width:100%;
  background:#111;
  color:gold;
  padding:15px;
  border:none;
  text-align:left;
  font-size:16px;
  cursor:pointer;
}
.content{
  display:none;
  padding:15px;
  color:#ccc;
}

/* ẢNH */
.img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* CTA */
.cta{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
}
.cta a{
  flex:1;
  text-align:center;
  padding:15px;
  background:#000;
  color:gold;
  font-weight:bold;
  border-top:1px solid gold;
}
.cta a:first-child{
  background:gold;
  color:#000;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
<img src="https://raw.githubusercontent.com/sonbachTP/sonbach_autohud/refs/heads/main/logo-sb-vip-pro.png">
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h2>MẶT TIỀN AN DƯƠNG VƯƠNG</h2>
    <div class="price">27 TỶ</div>
    <div>Thương lượng trực tiếp</div>
    <div class="btn" onclick="openNDA()">NHẬN NDA</div>
  </div>
</div>

<!-- NDA -->
<div class="section">
  <div id="ndaBox" style="display:none">
    <input placeholder="Họ tên" style="width:100%;padding:10px;margin-bottom:10px">
    <input placeholder="SĐT" style="width:100%;padding:10px;margin-bottom:10px">
    <button class="btn" onclick="showContent()">TÔI ĐỒNG Ý</button>
  </div>
</div>

<!-- NỘI DUNG ẨN -->
<div id="mainContent" style="display:none" class="section">

  <div class="box">
    <button onclick="toggle(this)">THÔNG SỐ</button>
    <div class="content">
      Ngang 9m – 153m² – 3 tầng – hoàn công đầy đủ
    </div>
  </div>

  <div class="box">
    <button onclick="toggle(this)">GIÁ TRỊ</button>
    <div class="content">
      Mặt tiền lớn – kinh doanh mạnh – trục đường 2 chiều
    </div>
  </div>

  <div class="box">
    <button onclick="toggle(this)">HIỆN TRẠNG</button>
    <div class="content">
      <img class="img" src="https://raw.githubusercontent.com/sonbachTP/sonbach_autohud/refs/heads/main/D541F61D-0E11-4145-A75F-D450C04F2851.png">
    </div>
  </div>

  <div class="box">
    <button onclick="toggle(this)">TƯƠNG LAI</button>
    <div class="content">
      <img class="img" src="https://raw.githubusercontent.com/sonbachTP/sonbach_autohud/refs/heads/main/D8B24CF4-D36D-431E-85DD-0FC9CBBDB417.png">
    </div>
  </div>

</div>

<!-- CTA -->
<div class="cta">
  <a href="tel:0858999934">GỌI NGAY</a>
  <a href="https://zalo.me/0858999934">ZALO</a>
</div>

<script>
function openNDA(){
  document.getElementById("ndaBox").style.display="block";
}
function showContent(){
  document.getElementById("mainContent").style.display="block";
}
function toggle(btn){
  let c = btn.nextElementSibling;
  c.style.display = c.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
